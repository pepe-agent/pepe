<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cortex">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="glyph" x1="160" y1="120" x2="360" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF0FF"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- cerebral cortex: two mirrored lobes split by a central fissure -->
  <g stroke="url(#glyph)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- left lobe outline -->
    <path d="M256 150
             C212 124 156 132 132 178
             C112 178 96 200 104 226
             C84 244 86 278 112 290
             C108 320 130 348 164 350
             C180 380 220 388 256 372"/>
    <!-- right lobe outline (mirror) -->
    <path d="M256 150
             C300 124 356 132 380 178
             C400 178 416 200 408 226
             C428 244 426 278 400 290
             C404 320 382 348 348 350
             C332 380 292 388 256 372"/>
    <!-- central fissure -->
    <path d="M256 150 L256 372"/>
    <!-- left sulci -->
    <path d="M176 196 C206 206 214 232 196 252"/>
    <path d="M156 300 C188 296 206 276 200 252"/>
    <!-- right sulci -->
    <path d="M336 196 C306 206 298 232 316 252"/>
    <path d="M356 300 C324 296 306 276 312 252"/>
  </g>

  <!-- synapse nodes -->
  <g fill="#FFFFFF">
    <circle cx="256" cy="150" r="20"/>
    <circle cx="196" cy="252" r="15"/>
    <circle cx="316" cy="252" r="15"/>
    <circle cx="164" cy="350" r="13"/>
    <circle cx="348" cy="350" r="13"/>
    <circle cx="256" cy="372" r="17"/>
  </g>
</svg>
